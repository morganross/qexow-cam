name: Release CAM Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify strict CAM contract
      run: npm run test:strict-contract

    - name: Download and Extract Linux Base Binaries
      shell: pwsh
      run: |
        $homeDir = [System.Environment]::GetFolderPath('UserProfile')
        $binDir = Join-Path $homeDir ".bin"
        New-Item -ItemType Directory -Force -Path $binDir

        Write-Host "Downloading Linux x64 base..."
        $x64Zip = Join-Path $binDir "node-v22.22.3-linux-x64.tar.gz"
        Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.22.3/node-v22.22.3-linux-x64.tar.gz" -OutFile $x64Zip -ErrorAction Stop
        tar -xf $x64Zip -C $binDir "node-v22.22.3-linux-x64/bin/node"

        Write-Host "Downloading Linux arm64 base..."
        $arm64Zip = Join-Path $binDir "node-v22.22.3-linux-arm64.tar.gz"
        Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.22.3/node-v22.22.3-linux-arm64.tar.gz" -OutFile $arm64Zip -ErrorAction Stop
        tar -xf $arm64Zip -C $binDir "node-v22.22.3-linux-arm64/bin/node"

    - name: Build installer payload
      run: npm run build:installer-payload

    - name: Install Inno Setup
      run: choco install innosetup --yes --no-progress

    - name: Compile Inno Setup Installer
      shell: pwsh
      run: |
        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
        }
        & $iscc installer.iss

    - name: Smoke test installer
      shell: pwsh
      run: |
        $installer = "dist\QexowCamSetup.exe"
        $log = Join-Path $env:TEMP "qexow-cam-installer-smoke.log"
        $staleQexow = Join-Path $env:LOCALAPPDATA "Programs\Qexow CAM"
        $staleCodex = Join-Path $env:LOCALAPPDATA "Programs\Codex Agent Manager"
        $camHome = Join-Path $env:USERPROFILE ".qexow-cam"
        $legacyCamHome = Join-Path $env:USERPROFILE ".codex-agent-manager"
        $expectedVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version

        function Wait-CamHealth {
          param([string]$ExpectedVersion)
          for ($i = 0; $i -lt 40; $i++) {
            try {
              $health = Invoke-RestMethod -Uri "http://127.0.0.1:37631/health" -TimeoutSec 2
              if ($health.ok -and $health.version -eq $ExpectedVersion) {
                return $health
              }
            } catch {
            }
            Start-Sleep -Seconds 1
          }
          throw "Headless installer did not start a healthy CAM daemon on 127.0.0.1:37631"
        }

        function Assert-CamProcessState {
          param([bool]$ExpectGui)
          $processes = Get-CimInstance Win32_Process
          $camProcesses = @($processes | Where-Object { $_.Name -eq "cam.exe" -and $_.ExecutablePath -like "C:\Program Files\Qexow CAM\*" })
          $guiProcesses = @($processes | Where-Object { $_.Name -eq "qexow-cam-gui.exe" -and $_.ExecutablePath -like "C:\Program Files\Qexow CAM\*" })
          if ($camProcesses.Count -lt 1) { throw "No installed cam.exe daemon process is running after install" }
          if ($ExpectGui -and $guiProcesses.Count -ne 1) { throw "Expected exactly one installed qexow-cam-gui.exe process, found $($guiProcesses.Count)" }
          if (-not $ExpectGui -and $guiProcesses.Count -ne 0) { throw "Headless install unexpectedly launched qexow-cam-gui.exe" }
        }

        function Invoke-SetupProcess {
          param(
            [string]$FilePath,
            [string[]]$ArgumentList,
            [string]$LogPath,
            [string]$Label,
            [int]$TimeoutSeconds = 90
          )
          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $FilePath
          foreach ($arg in $ArgumentList) { [void]$psi.ArgumentList.Add($arg) }
          $psi.UseShellExecute = $false
          $process = [System.Diagnostics.Process]::Start($psi)
          if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
            Write-Host "$Label timed out after $TimeoutSeconds seconds."
            Get-CimInstance Win32_Process |
              Where-Object { $_.Name -in @("QexowCamSetup.exe","unins000.exe","cam.exe","qexow-cam-gui.exe","node.exe") -or $_.ExecutablePath -like "C:\Program Files\Qexow CAM\*" } |
              Select-Object ProcessId,ParentProcessId,Name,ExecutablePath,CommandLine |
              Format-List | Out-String -Width 500 | Write-Host
            Get-Content $LogPath -ErrorAction SilentlyContinue
            try { $process.Kill($true) } catch {}
            throw "$Label timed out"
          }
          if ($process.ExitCode -ne 0) {
            Get-Content $LogPath -ErrorAction SilentlyContinue
            throw "$Label failed with exit code $($process.ExitCode)"
          }
        }

        function Assert-StaleRuntimeFileRemoved {
          param([string]$Path, [string]$Marker, [string]$Label)
          if (Test-Path $Path) {
            $content = Get-Content $Path -Raw -ErrorAction SilentlyContinue
            if ($content -match [regex]::Escape($Marker)) {
              throw "$Label still contains stale preinstall marker"
            }
          }
        }

        New-Item -ItemType Directory -Force -Path $staleQexow,$staleCodex | Out-Null
        Set-Content -Path (Join-Path $staleQexow "cam.exe") -Value "stale fake cam"
        Set-Content -Path (Join-Path $staleQexow "tray_windows_release.exe") -Value "stale fake tray"
        Set-Content -Path (Join-Path $staleCodex "cam.exe") -Value "stale fake codex cam"
        New-Item -ItemType Directory -Force -Path $camHome,$legacyCamHome | Out-Null
        Set-Content -Path (Join-Path $camHome "agents.json") -Value '{"stale_preinstall_agents":true}'
        Set-Content -Path (Join-Path $camHome "mailbox.jsonl") -Value '{"stale_preinstall_mailbox":true}'
        Set-Content -Path (Join-Path $camHome "tests.jsonl") -Value '{"stale_preinstall_tests":true}'
        Set-Content -Path (Join-Path $camHome "config.json") -Value '{"stale_preinstall_config":true}'
        Set-Content -Path (Join-Path $legacyCamHome "agents.json") -Value '{"legacy_stale":true}'
        if (Test-Path $log) { Remove-Item $log -Force }
        Invoke-SetupProcess -FilePath $installer -ArgumentList @("/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/HEADLESS","/LOG=$log") -LogPath $log -Label "Installer smoke"
        $text = Get-Content $log -Raw
        if ($text -notmatch "Installation process succeeded") {
          Get-Content $log
          throw "Installer smoke log did not contain success marker"
        }
        if (-not (Test-Path "C:\Program Files\Qexow CAM\cam.exe")) { throw "Installed cam.exe missing" }
        if (-not (Test-Path "C:\Program Files\Qexow CAM\qexow-cam-gui.exe")) { throw "Installed GUI missing" }
        Assert-StaleRuntimeFileRemoved -Path (Join-Path $camHome "agents.json") -Marker "stale_preinstall_agents" -Label "agents.json"
        Assert-StaleRuntimeFileRemoved -Path (Join-Path $camHome "mailbox.jsonl") -Marker "stale_preinstall_mailbox" -Label "mailbox.jsonl"
        Assert-StaleRuntimeFileRemoved -Path (Join-Path $camHome "tests.jsonl") -Marker "stale_preinstall_tests" -Label "tests.jsonl"
        Assert-StaleRuntimeFileRemoved -Path (Join-Path $camHome "config.json") -Marker "stale_preinstall_config" -Label "config.json"
        if (Test-Path (Join-Path $legacyCamHome "agents.json")) { throw "Reinstall did not remove legacy agents.json map" }
        if (Test-Path $legacyCamHome) { throw "Default reinstall did not fully remove legacy CAM home $legacyCamHome" }
        $health = Wait-CamHealth -ExpectedVersion $expectedVersion
        Assert-CamProcessState -ExpectGui $false
        powershell -NoProfile -ExecutionPolicy Bypass -File scripts\assert-no-stale-installed-cam.ps1
        New-Item -ItemType Directory -Force -Path $camHome | Out-Null
        Set-Content -Path (Join-Path $camHome "agents.json") -Value '{"preserve_on_reinstall":true}'
        Set-Content -Path (Join-Path $camHome "mailbox.jsonl") -Value '{"preserve_on_reinstall":true}'
        Invoke-SetupProcess -FilePath $installer -ArgumentList @("/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/HEADLESS","/LOG=$log","/TASKS=preserve_state") -LogPath $log -Label "Installer preserve-state smoke"
        $health = Wait-CamHealth -ExpectedVersion $expectedVersion
        Assert-CamProcessState -ExpectGui $false
        if (-not (Test-Path (Join-Path $camHome "agents.json"))) { throw "Preserve-state reinstall unexpectedly removed agents.json" }
        if (-not (Test-Path (Join-Path $camHome "mailbox.jsonl"))) { throw "Preserve-state reinstall unexpectedly removed mailbox.jsonl" }
        $uninstaller = "C:\Program Files\Qexow CAM\unins000.exe"
        if (-not (Test-Path $uninstaller)) { throw "Uninstaller missing" }
        New-Item -ItemType Directory -Force -Path $camHome | Out-Null
        Set-Content -Path (Join-Path $camHome "agents.json") -Value '{"uninstall_should_delete":true}'
        Invoke-SetupProcess -FilePath $uninstaller -ArgumentList @("/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART") -LogPath $log -Label "Uninstaller smoke"
        if (Test-Path $camHome) { throw "Uninstall did not remove CAM home $camHome" }

    - name: Delete standalone executable payloads
      run: npm run purge-standalone-exes

    - name: Upload Windows release artifact
      uses: actions/upload-artifact@v4
      with:
        name: qexow-cam-windows
        path: dist/QexowCamSetup.exe

  build_linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            deb_arch: amd64
            node_dist: node-v22.22.3-linux-x64
          - arch: arm64
            deb_arch: arm64
            node_dist: node-v22.22.3-linux-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify strict CAM contract
      run: npm run test:strict-contract

    - name: Download target Node runtime
      shell: bash
      run: |
        set -euxo pipefail
        cd "$RUNNER_TEMP"
        curl -fsSLO "https://nodejs.org/dist/v22.22.3/${{ matrix.node_dist }}.tar.gz"
        tar -xzf "${{ matrix.node_dist }}.tar.gz"

    - name: Build Linux package
      shell: bash
      run: |
        set -euxo pipefail
        npm run build:linux-package -- \
          --arch "${{ matrix.arch }}" \
          --node-bin "$RUNNER_TEMP/${{ matrix.node_dist }}/bin/node" \
          --node-version "22.22.3"

    - name: Inspect Linux package contents
      shell: bash
      run: |
        set -euxo pipefail
        dpkg-deb -c "dist/qexow-cam_"*"_"${{ matrix.deb_arch }}".deb"

    - name: Smoke test Linux amd64 install
      if: matrix.deb_arch == 'amd64'
      shell: bash
      run: |
        set -euxo pipefail
        sudo dpkg -i "dist/qexow-cam_"*"_"${{ matrix.deb_arch }}".deb"
        test -x /usr/local/bin/cam
        CAM_APP_ROOT=/opt/qexow-cam /usr/local/bin/cam init
        CAM_APP_ROOT=/opt/qexow-cam /usr/local/bin/cam inventory export
        test -f "$HOME/.qexow-cam/config.json"
        test -f "$HOME/.qexow-cam/docs/README.md"
        sudo CAM_PRESERVE_STATE=1 dpkg -i "dist/qexow-cam_"*"_"${{ matrix.deb_arch }}".deb"
        test -x /usr/local/bin/cam
        sudo dpkg -r qexow-cam
        test ! -e /usr/local/bin/cam

    - name: Upload Linux release artifact
      uses: actions/upload-artifact@v4
      with:
        name: qexow-cam-linux-${{ matrix.deb_arch }}
        path: dist/qexow-cam_*_${{ matrix.deb_arch }}.deb

  publish_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build_windows
      - build_linux

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-artifacts/**/*.exe
          release-artifacts/**/*.deb
